<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Comparison Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Prevent layout shifts from scrollbars appearing/disappearing */
            scrollbar-gutter: stable;
            overflow: hidden;
        }

        #comparison-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: auto; /* Single scrollbar for the whole view */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-stack {
            position: relative;
            display: inline-block;
            line-height: 0;
        }

        img {
            display: block;
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            pointer-events: none;
            user-select: none;
        }

        /* The Improved image is stacked on top of the Original */
        .improved-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            opacity: 0;
        }

        .original-wrapper {
            position: relative;
            z-index: 1;
        }

        /* Labels */
        .label {
            position: fixed; /* Keep labels visible regardless of scroll */
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 25px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
        }

        /* Animation classes */
        .animate-fade {
            animation: toggleOpacity 5s infinite;
        }
        .animate-label-orig {
            animation: toggleLabelOriginal 5s infinite;
        }
        .animate-label-impr {
            animation: toggleLabelImproved 5s infinite;
        }

        @keyframes toggleOpacity {
            0%, 45% { opacity: 0; }
            55%, 100% { opacity: 1; }
        }

        @keyframes toggleLabelOriginal {
            0%, 45% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes toggleLabelImproved {
            0%, 50% { opacity: 0; }
            55%, 100% { opacity: 1; }
        }

        /* Info Overlay */
        #info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            z-index: 100;
            font-size: 12px;
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="info">Always starting with Original • New pair every 5s</div>

    <div id="comparison-container">
        <div id="label-original" class="label animate-label-orig">Originali</div>
        <div id="label-improved" class="label animate-label-impr">Eksperimento</div>

        <div class="image-stack">
            <!-- The Improved image (top layer) -->
            <div id="improved-wrapper" class="improved-wrapper animate-fade">
                <img id="img-improved" src="" alt="Improved">
            </div>

            <!-- The Original image (bottom layer) -->
            <div class="original-wrapper">
                <img id="img-original" src="" alt="Original">
            </div>
        </div>
    </div>

    <script>
        const imgOriginal = document.getElementById('img-original');
        const imgImproved = document.getElementById('img-improved');
        const improvedWrapper = document.getElementById('improved-wrapper');
        const labelOrig = document.getElementById('label-original');
        const labelImpr = document.getElementById('label-improved');
        const info = document.getElementById('info');
        const container = document.getElementById('comparison-container');

        // List of image indices to show. Comment out any line to skip that image.
        const IMAGE_SEQUENCE = [
            4,
            3,
            17,
            22,
            9,
            19,
            41,
            38
        ];

        let sequenceIndex = -1; 

        function getImagePath(type, imageNum) {
            const paddedIndex = String(imageNum).padStart(3, '0');
            const folder = type === 'original' ? 'original-realsr-sharper' : 'improved-realsr-sharper';
            return `images/${folder}/Canon_${paddedIndex}.png`;
        }

        function restartAnimations() {
            improvedWrapper.style.opacity = '';
            labelOrig.style.opacity = '';
            labelImpr.style.opacity = '';

            improvedWrapper.classList.remove('animate-fade');
            labelOrig.classList.remove('animate-label-orig');
            labelImpr.classList.remove('animate-label-impr');
            
            void improvedWrapper.offsetWidth;
            
            improvedWrapper.classList.add('animate-fade');
            labelOrig.classList.add('animate-label-orig');
            labelImpr.classList.add('animate-label-impr');
        }

        function stopSlideshow() {
            if (slideshowInterval) {
                clearInterval(slideshowInterval);
                slideshowInterval = null;
            }
            const currentImageNum = IMAGE_SEQUENCE[sequenceIndex];
            info.textContent = `Showing pair: Canon_${String(currentImageNum).padStart(3, '0')} (Slideshow Paused)`;
        }

        function setManualFlip(type) {
            stopSlideshow();
            
            improvedWrapper.classList.remove('animate-fade');
            labelOrig.classList.remove('animate-label-orig');
            labelImpr.classList.remove('animate-label-impr');

            if (type === 'improved') {
                improvedWrapper.style.opacity = '1';
                labelOrig.style.opacity = '0';
                labelImpr.style.opacity = '1';
            } else {
                improvedWrapper.style.opacity = '0';
                labelOrig.style.opacity = '1';
                labelImpr.style.opacity = '0';
            }
        }

        async function updateImages() {
            sequenceIndex = (sequenceIndex + 1) % IMAGE_SEQUENCE.length;
            const imageNum = IMAGE_SEQUENCE[sequenceIndex];
            
            const origSrc = getImagePath('original', imageNum);
            const imprSrc = getImagePath('improved', imageNum);
            
            const preload = (src) => new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(src);
                img.onerror = () => resolve(src); // Continue anyway on error
                img.src = src;
            });

            await Promise.all([preload(origSrc), preload(imprSrc)]);

            imgOriginal.src = origSrc;
            imgImproved.src = imprSrc;
            
            container.scrollTo(0, 0);
            restartAnimations();
            
            const status = slideshowInterval ? '' : ' (Slideshow Paused)';
            info.textContent = `Showing pair: Canon_${String(imageNum).padStart(3, '0')}${status} (Arrows: ←→ to skip, ↑↓ to flip)`;
        }

        updateImages();

        let slideshowInterval;
        function startSlideshow() {
            if (slideshowInterval) clearInterval(slideshowInterval);
            slideshowInterval = setInterval(updateImages, 5000);
        }

        function navigate(direction) {
            if (direction === 'next') {
                updateImages();
            } else {
                sequenceIndex = sequenceIndex - 2;
                if (sequenceIndex < -1) sequenceIndex = IMAGE_SEQUENCE.length + sequenceIndex;
                updateImages();
            }
            startSlideshow();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') navigate('next');
            else if (e.key === 'ArrowLeft') navigate('prev');
            else if (e.key === 'ArrowUp') setManualFlip('improved');
            else if (e.key === 'ArrowDown') setManualFlip('original');
        });

        startSlideshow();
    </script>
</body>
</html>
