name: TEST_VGG128_L1
model_type: HATModel
scale: 4
num_gpu: 0  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:

  test_1:
    name: Set5
    type: EvalImagePairedDataset
    dataset: set5
    h5_file: datasets/test-sisr.h5
    gt_size: 256

  test_2:
    name: Set14
    type: EvalImagePairedDataset
    dataset: set14
    h5_file: datasets/test-sisr.h5
    gt_size: 256

  test_3:
    name: BSD100
    type: EvalImagePairedDataset
    dataset: bsd100
    h5_file: datasets/test-sisr.h5
    gt_size: 256

  test_4:
    name: Urban100
    type: EvalImagePairedDataset
    dataset: urban100
    h5_file: datasets/test-sisr.h5
    gt_size: 256

  test_5:
    name: Manga109
    type: EvalImagePairedDataset
    dataset: manga109
    h5_file: datasets/test-sisr.h5
    gt_size: 256

# network structures
network_g:
  type: HAT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'


# path
path:
  pretrain_network_g: ./options/test/baseline/hat_gan_vgg128_l1.pth # https://drive.google.com/drive/folders/178JSEp0j7gJd2cmzPZiQBOPXrtOxEaTz?dmr=1&ec=wgc-drive-%5Bmodule%5D-goto
  strict_load_g: true
  param_key_g: 'params_ema'

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    niqe:
      type: calculate_niqe
      crop_border: 4
      better: lower  # the lower, the better
    lpips:
      type: calculate_lpipsv2
      crop_border: 4
      test_y_channel: false
      better: lower
    dists:
      type: calculate_dists
      crop_border: 4
      test_y_channel: false
      better: lower
    topiq:
      type: calculate_topiq
      crop_border: 4
      test_y_channel: false
      better: higher
    laplacian_var:
      type: calculate_laplacian_var
      crop_border: 4
      test_y_channel: false
      better: higher
    clipiqa:
      type: calculate_clipiqa
      crop_border: 4
      test_y_channel: false
      better: higher
    maniqa:
      type: calculate_maniqa
      crop_border: 4
      test_y_channel: false
      better: higher
    musiq:
      type: calculate_musiq
      crop_border: 4
      test_y_channel: false
      better: higher